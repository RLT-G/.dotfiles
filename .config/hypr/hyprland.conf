# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}

#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us,ru
    kb_variant = ,
    kb_model = pc105
    kb_options = grp:win_space_toggle
    kb_rules = evdev

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = CTRL ALT, T, exec, kitty
bind = CTRL ALT, K, killactive,
bind = CTRL ALT, F, exec, $file_manager
bind = CTRL ALT, R, exec, $menu
bind = CTRL ALT, I, exec, kitty -e pulsemixer
bind = CTRL ALT, B, exec, blueman-manager

bind = Super_L, R, togglesplit # dwindle
bind = Super_L, F, togglefloating,
bind = Super_L, P, pseudo, # dwindle
bind = Super_L, S, fullscreen
bind = Super_L, V, exec, cliphist list | wofi --dmenu --allow-images --allow-markup --hide-scroll --width=300 --height=485 --normal-window | cliphist decode | wl-copy

bind = Super_L SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
bind = , F11, exec, grim -o "$(hyprctl monitors -j | jq -r '.[] | select(.focused==true) | .name')" - | wl-copy


bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = Super_L, 1, workspace, 1
bind = Super_L, 2, workspace, 2
bind = Super_L, 3, workspace, 3
bind = Super_L, 4, workspace, 4
bind = Super_L, 5, workspace, 5
bind = Super_L, 6, workspace, 6
bind = Super_L, 7, workspace, 7
bind = Super_L, 8, workspace, 8
bind = Super_L, 9, workspace, 9
bind = Super_L, 0, workspace, 10
bind = Super_L, F3, togglespecialworkspace

bind = Super_L SHIFT, 1, movetoworkspace, 1
bind = Super_L SHIFT, 2, movetoworkspace, 2
bind = Super_L SHIFT, 3, movetoworkspace, 3
bind = Super_L SHIFT, 4, movetoworkspace, 4
bind = Super_L SHIFT, 5, movetoworkspace, 5
bind = Super_L SHIFT, 6, movetoworkspace, 6
bind = Super_L SHIFT, 7, movetoworkspace, 7
bind = Super_L SHIFT, 8, movetoworkspace, 8
bind = Super_L SHIFT, 9, movetoworkspace, 9
bind = Super_L SHIFT, 0, movetoworkspace, 10
bind = Super_L SHIFT, F3, movetoworkspace, special

bind = Super_L, h, movefocus, l
bind = Super_L, l, movefocus, r
bind = Super_L, k, movefocus, u
bind = Super_L, j, movefocus, d

bind = Super_L SHIFT, h, movewindow, l
bind = Super_L SHIFT, l, movewindow, r
bind = Super_L SHIFT, k, movewindow, u
bind = Super_L SHIFT, j, movewindow, d

bind = Super_L ALT, h, resizeactive, -50 0
bind = Super_L ALT, l, resizeactive, 50 0
bind = Super_L ALT, k, resizeactive, 0 -50
bind = Super_L ALT, j, resizeactive, 0 50

# Scroll through existing workspaces with mainMod + scroll
bind = Super_L, mouse_down, workspace, e+1
bind = Super_L, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = Super_L, mouse:272, movewindow
bindm = Super_L, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# CUSTOM RULES
windowrule {
    name = kitty-center-float

    match:class = kitty
    pseudo = yes 

    float = yes 
    size = 1200 720
}

windowrule {
    name = blueman_manager_float

    match:class = blueman-manager

    float = yes 
    size = 800 485
}

windowrule {
    name = telegram-pseudo

    match:class = org.telegram.desktop

    pseudo = yes 
    size = 420 850
}

windowrule {
    name = nekobox-pseudo

    match:class = nekobox

    pseudo = yes 
    size = 850 850
}

