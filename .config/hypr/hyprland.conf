# ----- MONITORS ----- #
# See https://wiki.hypr.land/Configuring/Monitors/
monitor=eDP-1,1920x1200@60Hz,0x0,1
monitor=HDMI-A-1,2560x1440@60Hz,1920x0,1

workspace = 1, monitor:eDP-1
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1
workspace = 6, monitor:HDMI-A-1
workspace = 7, monitor:HDMI-A-1
workspace = 8, monitor:HDMI-A-1
workspace = 9, monitor:HDMI-A-1
workspace = 10, monitor:HDMI-A-1
###################
### MY PROGRAMS ###
###################

$terminal = kitty
$file_manager = kitty -e yazi
$menu = wofi --show drun --allow-images --allow-markup --hide-scroll --width=300 --height=485 --normal-window

#################
### AUTOSTART ###
#################

exec-once = waybar
exec-once = awww-daemon
# pacman -S wl-clipboard
# pacman -S cliphist
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hyprctl setcursor "Future-cyan-cursors" 24
exec-once = mpvpaper -o "loop --panscan=1.0 --no-audio" eDP-1 ~/.config/wallpaper/2debila.mp4 

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = QT_QPA_PLATFORM,wayland

